<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>co-op.rise - Red de Cooperación</title>
    
    <!-- Google Fonts: Vollkorn for title, Montserrat for UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vollkorn:ital,wght@0,600;0,700;1,600&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Leaflet Geocoder CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ants-path"></div>

    <div class="app-wrapper">
        <div id="map"></div>

        <div class="header">
            <div class="language-switcher">
                <button id="lang-es" class="lang-btn active">ES</button>
                <button id="lang-en" class="lang-btn">EN</button>
            </div>
            <h1>co-op<span class="dot-arrow">.</span>rise</h1>
            <p data-i18n="subtitle">red de cooperación territorial ante el alza de precios</p>
        </div>

        <!-- Top Controls: Search & Custom Filters -->
        <div class="top-controls">
            <div id="search-container" class="search-box"></div>
            <div class="custom-map-filters">
                <label class="filter-option"><input type="checkbox" checked value="prestar"> <span data-i18n="cat_prestar">Prestar</span></label>
                <label class="filter-option"><input type="checkbox" checked value="ayudar"> <span data-i18n="cat_ayudar">Ayudar</span></label>
                <label class="filter-option"><input type="checkbox" checked value="movilizacion"> <span data-i18n="cat_movilizacion">Movilización</span></label>
            </div>
            <input type="text" id="content-search" class="content-search" data-i18n-placeholder="search_ants" placeholder="Buscar en hormigas...">
        </div>

        <!-- Modal for adding information -->
        <div id="info-modal" class="modal">
            <div class="modal-content">
                <h2 data-i18n="modal_title">Categorizar Participación</h2>
                
                <div class="category-selector">
                    <button class="category-btn" data-category="prestar" data-i18n="cat_prestar">Prestar</button>
                    <button class="category-btn" data-category="ayudar" data-i18n="cat_ayudar">Ayudar</button>
                    <button class="category-btn" data-category="movilizacion" data-i18n="cat_movilizacion">Movilización</button>
                </div>

                <!-- Conditional Fields for "Prestar" -->
                <div id="fields-prestar" class="conditional-fields">
                    <div class="input-group">
                        <label data-i18n="prestar_dar_label">¿Algo que puedas prestar?</label>
                        <textarea id="prestar-dar" data-i18n-placeholder="prestar_dar_placeholder" placeholder="Herramientas, tiempo, espacio..."></textarea>
                    </div>
                    <div class="input-group">
                        <label data-i18n="prestar_pedir_label">¿Algo que necesites usar?</label>
                        <textarea id="prestar-pedir" data-i18n-placeholder="prestar_pedir_placeholder" placeholder="Indica qué necesitas..."></textarea>
                    </div>
                </div>

                <!-- Conditional Fields for "Ayudar" -->
                <div id="fields-ayudar" class="conditional-fields">
                    <div class="input-group">
                        <label data-i18n="ayudar_dar_label">¿En qué puedes ayudar?</label>
                        <textarea id="ayudar-dar" data-i18n-placeholder="ayudar_dar_placeholder" placeholder="Indica cómo puedes colaborar..."></textarea>
                    </div>
                    <div class="input-group">
                        <label data-i18n="ayudar_pedir_label">¿En algo que necesites ayuda?</label>
                        <textarea id="ayudar-pedir" data-i18n-placeholder="ayudar_pedir_placeholder" placeholder="Indica en qué necesitas ayuda..."></textarea>
                    </div>
                </div>

                <!-- Generic Fields for Movilización -->
                <div id="fields-generic" class="conditional-fields">
                    <div class="input-group">
                        <label id="generic-label" data-i18n="movilizacion_label">Detalles de la movilización</label>
                        <textarea id="generic-info" data-i18n-placeholder="movilizacion_placeholder" placeholder="Punto de encuentro, objetivo..."></textarea>
                    </div>
                </div>

                <div class="modal-buttons">
                    <button id="cancel-btn" class="btn-secondary" data-i18n="btn_cancel">Cancelar</button>
                    <button id="save-btn" class="btn-primary" data-i18n="btn_save">Guardar Punto</button>
                </div>
            </div>
        </div>

        <!-- Common Chat Sidebar -->
        <div id="chat-sidebar" class="chat-sidebar">
            <div class="chat-header">
                <h3 data-i18n="chat_title">Chat Común</h3>
                <button id="close-chat" class="close-btn">&times;</button>
            </div>
            <div id="chat-messages" class="chat-messages">
                <!-- Messages will appear here -->
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" data-i18n-placeholder="chat_placeholder" placeholder="Escribe un mensaje...">
                <button id="send-chat-btn" data-i18n="chat_send">Enviar</button>
            </div>
        </div>

        <!-- Chat Toggle Button -->
        <button id="toggle-chat-btn" class="toggle-chat-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
        </button>
    </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Leaflet Geocoder JS -->
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
